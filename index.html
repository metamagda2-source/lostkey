    <!-- React & Babel -->

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <!-- Tailwind CSS para diseño FULL PRO -->

    <!-- Google Fonts: Outfit (Urbana, moderna y amigable) -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f4f4f5; color: #18181b; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Animaciones suaves */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .slide-in-right { animation: slideInRight 0.4s ease-out forwards; }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        /* Marquee infinito */
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            display: flex;
            width: fit-content;
            animation: marquee 20s linear infinite;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        lk: { black: '#18181b', gray: '#a1a1aa', pink: '#f4a7b9', melange: '#e4e4e7', accent: '#000000' }
                    }
                }
            }
        }

</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        /* @jsx React.createElement */
        /* @jsxFrag React.Fragment */
        const { useState, useEffect } = React;

        // --- CONFIGURACIÓN DE LA TIENDA ---
        const CONFIG = {
            ig_user: "lostkey.cl",
            banco: "Mercado Pago",
            cuenta_tipo: "Cuenta Vista",
            cuenta_numero: "1044106930",
            nombre_titular: "LostKey",
            rut_titular: "221857445",
            correo_transferencia: "",
            precio_poleron: 25990,
            precio_pantalon: 19990,
            precio_conjunto: 39990,
            precio_envio: 0,
            // Pega aquí el enlace de tu Web App de Google Apps Script
            google_script_url: "https://script.google.com/macros/s/AKfycbzZ-ZbQbKeNA1SJapf-J4dZiXbevEIuU8rrtT8erhypqgTe31b9NXsy2XHvW4abIv--/exec"
        };

        // --- DATOS DEL MENÚ ---
        const colores = [
            { id: "negro", label: "Negro", hex: "#18181b", bg: "#71717a" }, // Gris oscuro para el negro
            { id: "gris_melange", label: "Gris Melange", hex: "#d4d4d8", bg: "#e4e4e7" }, // Gris pastel
            { id: "rosado", label: "Rosado", hex: "#fbcfe8", bg: "#fce7f3" } // Rosa pastel
        ];

        const tallas = ["S", "M", "L", "XL"];

        // --- COMPONENTE PRINCIPAL ---
        function LostKeyApp() {
            const [isStarted, setIsStarted] = useState(false);
            const [showTerms, setShowTerms] = useState(false);
            const [step, setStep] = useState(0);
            const [confirmado, setConfirmado] = useState(false);
            const [orderId] = useState(() => {
                const timePart = Date.now().toString(36).toUpperCase().slice(-4);
                const randomPart = Math.random().toString(36).substring(2, 6).toUpperCase();
                return `LK-${timePart}${randomPart}`;
            });
            
            // Estado para Quick Buy (Favoritos)
            const [selectedFav, setSelectedFav] = useState(null);
            const [favTalla, setFavTalla] = useState(null);
            const [isQuickBuy, setIsQuickBuy] = useState(false);
            const [copiedOrder, setCopiedOrder] = useState(false);
            const [copiedData, setCopiedData] = useState(false);

            const favoritosList = [
                {
                    id: 'fav_rosado',
                    nombre: 'Polerón Boxy Fit Rosado',
                    precio: CONFIG.precio_poleron,
                    imgFront: 'POLERON ROSADO/Rosado- bolsillos y bordados.png',
                    imgBack: 'POLERON ROSADO/rosado-atras bordado.png',
                    pedidoData: {
                        producto: 'poleron',
                        color: 'rosado',
                        bolsillos: 'con',
                        bordado_poleron: 'ambos'
                    }
                },
                {
                    id: 'fav_gris',
                    nombre: 'Polerón Boxy Fit Gris',
                    precio: CONFIG.precio_poleron,
                    imgFront: 'Poleron GRIS/Gris frente sin bolsillos pero con bordado.png',
                    imgBack: 'Poleron GRIS/parte trasera con bordado.png',
                    pedidoData: {
                        producto: 'poleron',
                        color: 'gris_melange',
                        bolsillos: 'sin',
                        bordado_poleron: 'ambos'
                    }
                },
                {
                    id: 'fav_negro',
                    nombre: 'Polerón Boxy Fit Negro',
                    precio: CONFIG.precio_poleron,
                    imgFront: 'POLERON NEGRO/frontal con bordado sin bolsillos.png',
                    imgBack: 'POLERON NEGRO/trasero con bordado (1).png',
                    pedidoData: {
                        producto: 'poleron',
                        color: 'negro',
                        bolsillos: 'sin',
                        bordado_poleron: 'ambos'
                    }
                },
                {
                    id: 'fav_pantalon_rosado',
                    nombre: 'Pantalón Wide Leg Rosado',
                    precio: CONFIG.precio_pantalon,
                    imgFront: 'Pantalones Rosados/parte de adelabnte co bordado.png',
                    imgBack: 'Pantalones Rosados/PANTALONES  atras LK.png',
                    pedidoData: {
                        producto: 'pantalon',
                        color: 'rosado',
                        bordado_pantalon: 'con'
                    }
                },
                {
                    id: 'fav_pantalon_gris',
                    nombre: 'Pantalón Wide Leg Gris',
                    precio: CONFIG.precio_pantalon,
                    imgFront: 'PANTALON GRIS/Pantalon gris parte de adelante.png',
                    imgBack: 'PANTALON GRIS/Pantalon gris parte de atras.png',
                    pedidoData: {
                        producto: 'pantalon',
                        color: 'gris_melange',
                        bordado_pantalon: 'con'
                    }
                },
                {
                    id: 'fav_pantalon_negro',
                    nombre: 'Pantalón Wide Leg Negro',
                    precio: CONFIG.precio_pantalon,
                    imgFront: 'PANTALONES NEGROS/pantalones adelante sin bordado.png',
                    imgBack: 'PANTALONES NEGROS/3(1).png',
                    pedidoData: {
                        producto: 'pantalon',
                        color: 'negro',
                        bordado_pantalon: 'sin'
                    }
                }
            ];

            // Datos de Outfits
            const lookOutfitsList = [
                {
                    id: 'outfit_gris',
                    nombre: 'Conjunto Gris Melange',
                    imgPrincipal: 'look outfit/gris cuerpo 1.png',
                    items: ['fav_gris', 'fav_pantalon_gris']
                }
            ];

            // Estado del pedido
            const initialPedidoState = {
                producto: null,
                color: null,
                talla: null,
                bolsillos: null,
                bordado_poleron: null,
                bolsillos_pantalon: null,
                bordado_pantalon: null,
                envio: 'retiro',
                metodo_pago: 'transferencia',
                contacto: { nombre: '', correo: '', instagram: '', whatsapp: '' }
            };
            const [pedido, setPedido] = useState(initialPedidoState);

            const resetPedido = () => {
                setPedido(initialPedidoState);
                setConfirmado(false);
            };
            const [isSubmitting, setIsSubmitting] = useState(false);

            // Efecto para actualizar la URL visualmente y añadir al historial de navegación
            React.useEffect(() => {
                let hash = '';
                if (confirmado) {
                    hash = '#pedido-confirmado';
                } else if (isStarted) {
                    let stepName = 'armar-prenda';
                    const currentStepName = ["producto", "color_talla", "detalles_poleron", "detalles_pantalon", "checkout"][step];
                    if (currentStepName) stepName = currentStepName.replace('_', '-');
                    hash = '#vista=' + stepName;
                }
                
                // Usamos pushState para que el botón Atrás de Google funcione
                if (window.location.hash !== hash) {
                    window.history.pushState(null, '', window.location.pathname + window.location.search + hash);
                }
            }, [isStarted, step, confirmado]);

            // Efecto para escuchar el botón Atrás o Adelante del navegador
            React.useEffect(() => {
                const handlePopState = () => {
                    const hash = window.location.hash;
                    if (!hash || hash === '') {
                        setIsStarted(false);
                        setConfirmado(false);
                        return;
                    }
                    if (hash === '#pedido-confirmado') {
                        setConfirmado(true);
                        return;
                    }
                    if (hash.startsWith('#vista=')) {
                        const view = hash.replace('#vista=', '');
                        const viewToStep = view.replace('-', '_');
                        
                        let currentSteps = ["producto", "color_talla"];
                        if (pedido.producto === 'poleron') currentSteps.push("detalles_poleron");
                        if (pedido.producto === 'pantalon') currentSteps.push("detalles_pantalon");
                        if (pedido.producto === 'conjunto') currentSteps.push("detalles_poleron", "detalles_pantalon");
                        currentSteps.push("checkout");

                        const index = currentSteps.indexOf(viewToStep);
                        if (index !== -1) {
                            setStep(index);
                            setIsStarted(true);
                            setConfirmado(false);
                        } else {
                            setStep(0);
                            setIsStarted(true);
                        }
                    }
                };

                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, [pedido.producto]);

            // Lógica de pasos dinámicos
            let steps = ["producto", "color_talla"];
            if (pedido.producto === 'poleron') steps.push("detalles_poleron");
            if (pedido.producto === 'pantalon') steps.push("detalles_pantalon");
            if (pedido.producto === 'conjunto') steps.push("detalles_poleron", "detalles_pantalon");
            steps.push("checkout");

            const currentStep = steps[step];

            // Cálculo de precio
            let precioBase = 0;
            if (pedido.producto === 'poleron') precioBase = CONFIG.precio_poleron;
            if (pedido.producto === 'pantalon') precioBase = CONFIG.precio_pantalon;
            if (pedido.producto === 'conjunto') precioBase = CONFIG.precio_conjunto;
            const total = precioBase + (pedido.envio === "despacho" ? CONFIG.precio_envio : 0);

            // Helpers para actualizar el estado
            const updatePedido = (key, value) => setPedido(prev => ({ ...prev, [key]: value }));
            const updateContacto = (key, value) => setPedido(prev => ({ ...prev, contacto: { ...prev.contacto, [key]: value } }));

            const nextStep = () => setStep(s => Math.min(s + 1, steps.length - 1));
            const prevStep = () => {
                if (isQuickBuy && currentStep === "checkout") {
                    setIsQuickBuy(false);
                    setIsStarted(false);
                    setStep(0);
                } else {
                    setStep(s => Math.max(s - 1, 0));
                }
            };

            // Validaciones para avanzar
            const canNext = () => {
                if (currentStep === "producto") return pedido.producto !== null;
                if (currentStep === "color_talla") return pedido.talla !== null && pedido.color !== null;
                if (currentStep === "detalles_poleron") return pedido.bolsillos !== null && pedido.bordado_poleron !== null;
                if (currentStep === "detalles_pantalon") return pedido.bordado_pantalon !== null;
                if (currentStep === "checkout") return pedido.contacto.nombre.trim() !== '' && pedido.contacto.correo.includes('@');
                return true;
            };

            const confirmarPedido = async () => {
                if (CONFIG.google_script_url) {
                    setIsSubmitting(true);
                    try {
                        const payload = {
                            orderId,
                            producto: pedido.producto,
                            color: colores.find(c=>c.id===pedido.color)?.label || pedido.color,
                            talla: pedido.talla,
                            bolsillos: pedido.bolsillos || 'N/A',
                            bordado_poleron: pedido.bordado_poleron || 'N/A',
                            bolsillos_pantalon: pedido.bolsillos_pantalon || 'N/A',
                            bordado_pantalon: pedido.bordado_pantalon || 'N/A',
                            total: total,
                            envio: pedido.envio,
                            metodo_pago: pedido.metodo_pago,
                            nombre: pedido.contacto.nombre,
                            correo: pedido.contacto.correo,
                            instagram: pedido.contacto.instagram || 'No indicó',
                            whatsapp: pedido.contacto.whatsapp || 'No indicó'
                        };
                        
                        await fetch(CONFIG.google_script_url, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: {
                                'Content-Type': 'text/plain;charset=utf-8'
                            },
                            body: JSON.stringify(payload)
                        });
                    } catch (error) {
                        console.error("Error enviando pedido:", error);
                    }
                    setIsSubmitting(false);
                }
                setConfirmado(true);
            };

            // Nombres de archivos dinámicos para las imágenes
            const getPreviewFileName = () => {
                const p = pedido;
                if (!p.producto || !p.color) return null;
                
                // --- MAPEO ESPECÍFICO: POLERÓN ROSADO ---
                if (p.producto === 'poleron' && p.color === 'rosado') {
                    let front = '';
                    let back = '';

                    // Lógica para el FRENTE (Por defecto muestra con bordado y bolsillos si no han elegido)
                    if (p.bordado_poleron === 'delantero' || p.bordado_poleron === 'ambos' || p.bordado_poleron === null) {
                        front = (p.bolsillos === 'con' || p.bolsillos === null)
                            ? `POLERON ROSADO/Rosado- bolsillos y bordados.png`
                            : `POLERON ROSADO/sin bolsillo pero con bordado alfrente.png`;
                    } else {
                        front = (p.bolsillos === 'con' || p.bolsillos === null)
                            ? `POLERON ROSADO/rosado con bolsillos y sin bordado.png`
                            : `POLERON ROSADO/sin bolsillos y sin bordados frente.png`;
                    }

                    // Lógica para la ESPALDA
                    if (p.bordado_poleron === 'espalda' || p.bordado_poleron === 'ambos') {
                        back = `POLERON ROSADO/rosado-atras bordado.png`;
                    } else {
                        back = `POLERON ROSADO/Espalda sin bordado rosado.png`;
                    }

                    // Solo dividir la pantalla en el paso de detalles del polerón si ya seleccionó un bordado
                    if (currentStep === 'detalles_poleron' && p.bordado_poleron !== null) {
                        return [front, back];
                    }
                    return front;
                }

                // --- MAPEO ESPECÍFICO: POLERÓN GRIS ---
                if (p.producto === 'poleron' && p.color === 'gris_melange') {
                    let front = '';
                    let back = '';

                    // Lógica para el FRENTE
                    if (p.bordado_poleron === 'delantero' || p.bordado_poleron === 'ambos' || p.bordado_poleron === null) {
                        front = (p.bolsillos === 'con' || p.bolsillos === null)
                            ? `Poleron GRIS/POLERON GRIS ENTERO.png`
                            : `Poleron GRIS/Gris frente sin bolsillos pero con bordado.png`;
                    } else {
                        front = (p.bolsillos === 'con' || p.bolsillos === null)
                            ? `Poleron GRIS/gris frente sin bordado con bolsillos.png`
                            : `Poleron GRIS/gris sin bordado y sin bolsillo.png`;
                    }

                    // Lógica para la ESPALDA
                    if (p.bordado_poleron === 'espalda' || p.bordado_poleron === 'ambos') {
                        back = `Poleron GRIS/parte trasera con bordado.png`;
                    } else {
                        back = `Poleron GRIS/parte trasera SIN BORDADO.png`;
                    }

                    // Solo dividir la pantalla en el paso de detalles
                    if (currentStep === 'detalles_poleron' && p.bordado_poleron !== null) {
                        return [front, back];
                    }
                    return front;
                }

                // --- MAPEO ESPECÍFICO: POLERÓN NEGRO ---
                if (p.producto === 'poleron' && p.color === 'negro') {
                    let front = '';
                    let back = '';

                    // Lógica para el FRENTE
                    if (p.bordado_poleron === 'delantero' || p.bordado_poleron === 'ambos' || p.bordado_poleron === null) {
                        front = (p.bolsillos === 'con' || p.bolsillos === null)
                            ? `POLERON NEGRO/parte fronal polerno negro con todo.png`
                            : `POLERON NEGRO/frontal con bordado sin bolsillos.png`;
                    } else {
                        front = (p.bolsillos === 'con' || p.bolsillos === null)
                            ? `POLERON NEGRO/frontal sin bordado con bosillos.png`
                            : `POLERON NEGRO/frontal sin nada.png`;
                    }

                    // Lógica para la ESPALDA
                    if (p.bordado_poleron === 'espalda' || p.bordado_poleron === 'ambos') {
                        back = `POLERON NEGRO/trasero con bordado (1).png`;
                    } else {
                        back = `POLERON NEGRO/trasero sin bordado (1).png`;
                    }

                    // Solo dividir la pantalla en el paso de detalles
                    if (currentStep === 'detalles_poleron' && p.bordado_poleron !== null) {
                        return [front, back];
                    }
                    return front;
                }

                // Formato estándar para polerones (Frente y Espalda simultáneos)
                if (p.producto === 'poleron') {
                    const bols = p.bolsillos || 'con'; // Muestra bolsillos por defecto
                    const bor = p.bordado_poleron || 'delantero'; // Muestra bordado delantero por defecto
                    const frontType = (bor === 'delantero' || bor === 'ambos') ? 'delantero' : 'sin';
                    const backType = (bor === 'espalda' || bor === 'ambos') ? 'espalda' : 'sin';
                    
                    const front = `poleron_${p.color}_bolsillos-${bols}_bordado-${frontType}.png`;
                    const back = `poleron_${p.color}_bolsillos-sin_bordado-${backType}.png`;
                    
                    // Solo dividir la pantalla en el paso de detalles si ya escogió bordado
                    if (currentStep === 'detalles_poleron' && p.bordado_poleron !== null) {
                        return [front, back];
                    }
                    return front;
                } 
                
                // Pantalón y Conjunto
                if (p.producto === 'pantalon') {
                    let front = '';
                    let back = '';

                    if (p.color === 'rosado') {
                        front = (p.bordado_pantalon === 'con' || p.bordado_pantalon === null) 
                            ? `Pantalones Rosados/parte de adelabnte co bordado.png` 
                            : `Pantalones Rosados/parte adelante sin bordado.png`;
                        back = `Pantalones Rosados/PANTALONES  atras LK.png`;
                    } else if (p.color === 'gris_melange') {
                        front = (p.bordado_pantalon === 'con' || p.bordado_pantalon === null) 
                            ? `PANTALON GRIS/Pantalon gris parte de adelante.png` 
                            : `PANTALON GRIS/parte de adelante pantalon sin bordado.png`;
                        back = `PANTALON GRIS/Pantalon gris parte de atras.png`;
                    } else if (p.color === 'negro') {
                        front = (p.bordado_pantalon === 'con' || p.bordado_pantalon === null)
                            ? `PANTALONES NEGROS/parte de adelante con bordado.png`
                            : `PANTALONES NEGROS/pantalones adelante sin bordado.png`;
                        back = `PANTALONES NEGROS/3(1).png`;
                    } else {
                        const bol = p.bolsillos_pantalon || 'sin';
                        const bor = p.bordado_pantalon || 'sin';
                        front = `pantalon_${p.color}_bolsillos-${bol}_bordado-${bor}.png`;
                        back = `pantalon_${p.color}_bolsillos-${bol}_bordado-${bor}.png`;
                    }

                    if (currentStep === 'detalles_pantalon' && p.bordado_pantalon !== null) {
                        return [front, back];
                    }
                    return front;
                } 
                if (p.producto === 'conjunto') {
                    let pol_front = '';
                    let pol_back = '';
                    if (p.color === 'rosado') {
                        pol_front = (p.bordado_poleron === 'delantero' || p.bordado_poleron === 'ambos' || p.bordado_poleron === null)
                            ? ((p.bolsillos === 'con' || p.bolsillos === null) ? `POLERON ROSADO/Rosado- bolsillos y bordados.png` : `POLERON ROSADO/sin bolsillo pero con bordado alfrente.png`)
                            : ((p.bolsillos === 'con' || p.bolsillos === null) ? `POLERON ROSADO/rosado con bolsillos y sin bordado.png` : `POLERON ROSADO/sin bolsillos y sin bordados frente.png`);
                        pol_back = (p.bordado_poleron === 'espalda' || p.bordado_poleron === 'ambos') ? `POLERON ROSADO/rosado-atras bordado.png` : `POLERON ROSADO/Espalda sin bordado rosado.png`;
                    } else if (p.color === 'gris_melange') {
                        pol_front = (p.bordado_poleron === 'delantero' || p.bordado_poleron === 'ambos' || p.bordado_poleron === null)
                            ? ((p.bolsillos === 'con' || p.bolsillos === null) ? `Poleron GRIS/POLERON GRIS ENTERO.png` : `Poleron GRIS/Gris frente sin bolsillos pero con bordado.png`)
                            : ((p.bolsillos === 'con' || p.bolsillos === null) ? `Poleron GRIS/gris frente sin bordado con bolsillos.png` : `Poleron GRIS/gris sin bordado y sin bolsillo.png`);
                        pol_back = (p.bordado_poleron === 'espalda' || p.bordado_poleron === 'ambos') ? `Poleron GRIS/parte trasera con bordado.png` : `Poleron GRIS/parte trasera SIN BORDADO.png`;
                    } else if (p.color === 'negro') {
                        pol_front = (p.bordado_poleron === 'delantero' || p.bordado_poleron === 'ambos' || p.bordado_poleron === null)
                            ? ((p.bolsillos === 'con' || p.bolsillos === null) ? `POLERON NEGRO/parte fronal polerno negro con todo.png` : `POLERON NEGRO/frontal con bordado sin bolsillos.png`)
                            : ((p.bolsillos === 'con' || p.bolsillos === null) ? `POLERON NEGRO/frontal sin bordado con bosillos.png` : `POLERON NEGRO/frontal sin nada.png`);
                        pol_back = (p.bordado_poleron === 'espalda' || p.bordado_poleron === 'ambos') ? `POLERON NEGRO/trasero con bordado (1).png` : `POLERON NEGRO/trasero sin bordado (1).png`;
                    }

                    let pan_front = '';
                    let pan_back = '';
                    if (p.color === 'rosado') {
                        pan_front = (p.bordado_pantalon === 'con' || p.bordado_pantalon === null) 
                            ? `Pantalones Rosados/parte de adelabnte co bordado.png` 
                            : `Pantalones Rosados/parte adelante sin bordado.png`;
                        pan_back = `Pantalones Rosados/PANTALONES  atras LK.png`;

                                        onClick={confirmarPedido}
                                        className={`w-full py-4 rounded-lg font-bold text-lg transition-all ${
                                            canNext() && !isSubmitting
                                            ? 'bg-black text-white hover:bg-zinc-800' 
                                            : 'bg-zinc-200 text-zinc-400 cursor-not-allowed'
                                        }`}
                                    >
                                        {isSubmitting ? "Procesando..." : "Confirmar Pedido"}
                                    </button>
                                </div>

                                <div className="h-20 md:h-0"></div> {/* Spacer mobile */}
                            </div>
                        </div>

                        {/* RIGHT COLUMN: SUMMARY */}
                        <div className="w-full md:w-1/2 lg:w-[45%] p-6 md:p-12 lg:pr-24 xl:pr-32 bg-zinc-50 border-b md:border-b-0 border-zinc-200">
                            <div className="max-w-md md:sticky top-12 space-y-6">
                                {/* ITEM ROW */}
                                <div className="flex items-center gap-4">
                                    <div className="relative w-16 h-16 bg-white border border-zinc-200 rounded-lg flex items-center justify-center p-1">
                                        <span className="absolute -top-2 -right-2 bg-zinc-500 text-white w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold">1</span>
                                        <img src={imgSrc} alt="Preview" className="w-full h-full object-contain mix-blend-darken" onError={(e)=>{e.target.src=getPlaceholderUrl()}} />
                                    </div>
                                    <div className="flex-1">
                                        <div className="font-semibold text-sm capitalize">{pedido.producto} {colores.find(c=>c.id===pedido.color)?.label}</div>
                                        <div className="text-xs text-zinc-500 mt-1">
                                            Talla {pedido.talla} 
                                            {pedido.producto === 'poleron' && ` • Bolsillos: ${pedido.bolsillos} • Bordado: ${pedido.bordado_poleron}`}
                                            {pedido.producto === 'pantalon' && ` • Bordado: ${pedido.bordado_pantalon}`}
                                            {pedido.producto === 'conjunto' && ` • Bolsillos Polerón: ${pedido.bolsillos} • Bordado Polerón: ${pedido.bordado_poleron} • Bordado Pantalón: ${pedido.bordado_pantalon}`}
                                        </div>
                                    </div>
                                    <div className="font-medium text-sm">${precioBase.toLocaleString("es-CL")}</div>
                                </div>
                                
                                <div className="h-px w-full bg-zinc-200"></div>

                                {/* TOTALS */}
                                <div className="space-y-3 text-sm">
                                    <div className="flex justify-between">
                                        <span className="text-zinc-600">Subtotal</span>
                                        <span className="font-medium">${precioBase.toLocaleString("es-CL")}</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-zinc-600">Envío</span>
                                        <span className="font-medium">{pedido.envio === 'despacho' ? 'Por pagar' : 'Gratis'}</span>
                                    </div>
                                </div>
                                
                                <div className="h-px w-full bg-zinc-200"></div>

                                <div className="flex justify-between items-center">
                                    <span className="font-bold text-lg">Total</span>
                                    <span className="font-black text-2xl"><span className="text-xs font-normal text-zinc-500 mr-2">CLP</span>${total.toLocaleString("es-CL")}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // PANTALLAS DEL CONFIGURADOR (PASO 2 EN ADELANTE)
            const currentColorObj = colores.find(c => c.id === pedido.color);
            const panelBgColor = currentColorObj ? currentColorObj.bg : '#f4f4f5';

            return (
                <div className="h-[100dvh] flex flex-col md:flex-row bg-white fade-in overflow-hidden">
                    
                    {/* PANEL IZQUIERDO: PREVIEW DINÁMICO */}
                    <div 
                        className="w-full md:w-1/2 lg:w-3/5 relative h-[45dvh] md:h-full flex flex-col items-center justify-center p-4 md:p-8 transition-colors duration-500"
                        style={{ backgroundColor: panelBgColor }}
                    >
                        {/* Header Logo Mobile */}
                        <div className="absolute top-6 left-6 md:hidden z-10">
                            <img src="./img/lostkey-superior.png" alt="Lostkey" className="h-12 object-contain" />
                        </div>
                        
                        {/* Imagen del producto */}
                        <div className="w-full h-full flex flex-row items-center justify-center relative z-0 gap-2 md:gap-4 px-2 md:px-0">
                            {(() => {
                                const filenames = getPreviewFileName();
                                if (!filenames) {
                                    return (
                                        <img 
                                            key="placeholder" 
                                            src={getPlaceholderUrl()} 
                                            alt="Preview" 
                                            className="max-w-full max-h-full object-contain drop-shadow-2xl fade-in mix-blend-darken"
                                        />
                                    );
                                }
                                
                                const filesArray = Array.isArray(filenames) ? filenames : [filenames];
                                
                                return filesArray.map((file, index) => (
                                    <img 
                                        key={JSON.stringify(pedido) + index} 
                                        src={`./img/${file}`} 
                                        onError={(e) => {
                                            e.target.onerror = null; 
                                            e.target.src = getPlaceholderUrl();
                                        }}
                                        alt={`Preview ${index}`} 
                                        className={`${filesArray.length > 1 ? 'w-1/2' : 'max-w-full'} max-h-full object-contain drop-shadow-2xl fade-in mix-blend-darken ${file.includes('PANTALONES NEGROS') ? 'scale-[0.70]' : ''}`}
                                    />
                                ));
                            })()}
                        </div>

                        {/* Detalles Flotantes (Badge) */}
                        {pedido.producto && (
                            <div className="absolute bottom-6 left-4 right-4 md:left-8 md:bottom-8 bg-white/90 backdrop-blur-md p-3 md:p-4 rounded-2xl shadow-lg border border-white/50 slide-in-right z-10 hidden md:block">
                                <div className="flex justify-between items-end">
                                    <div>
                                        <h3 className="font-bold text-lg md:text-xl uppercase">{pedido.producto} {colores.find(c=>c.id===pedido.color)?.label}</h3>
                                        <p className="text-xs md:text-sm text-zinc-500 font-medium">
                                            {pedido.talla ? `Talla ${pedido.talla}` : 'Sin talla'} 
                                            {pedido.producto === 'poleron' ? ` • ${pedido.bolsillos==='con'?'C/ Bolsillos':'S/ Bolsillos'}` : ''}
                                        </p>
                                    </div>
                                    <div className="text-xl md:text-2xl font-black">${total.toLocaleString("es-CL")}</div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* PANEL DERECHO: CONFIGURADOR TIPO KIOSKO */}
                    <div className="w-full md:w-1/2 lg:w-2/5 flex flex-col h-[55dvh] md:h-full bg-white relative rounded-t-3xl md:rounded-none -mt-4 md:mt-0 z-20 shadow-[0_-15px_30px_rgba(0,0,0,0.08)] md:shadow-none">
                        
                        {/* Header Desktop */}
                        <div className="hidden md:flex justify-between items-center p-8 pb-4">
                            <img src="./img/lostkey-superior.png" alt="Lostkey" className="h-16 object-contain" />
                            <div className="text-sm font-semibold bg-zinc-100 px-4 py-2 rounded-full">Paso {step + 1} de {steps.length}</div>
                        </div>

                        {/* Contenido Desplazable */}
                        <div className="flex-1 overflow-y-auto p-6 md:p-8 hide-scrollbar">
                            
                            {/* BOTÓN VOLVER */}
                            {step > 0 ? (
                                <button onClick={prevStep} className="text-zinc-400 font-medium hover:text-black transition-colors mb-6 flex items-center gap-2">
                                    ← Volver al paso anterior
                                </button>
                            ) : (
                                <button onClick={() => { setIsStarted(false); setConfirmado(false); }} className="text-zinc-400 font-medium hover:text-black transition-colors mb-6 flex items-center gap-2">
                                    ← Volver al inicio
                                </button>
                            )}

                            {/* PASO 2: COLOR Y TALLA */}
                            {currentStep === "color_talla" && (
                                <div className="fade-in">
                                    <h2 className="text-3xl font-bold mb-8">Elige Color y Talla</h2>
                                    
                                    <div className="mb-8">
                                        <h3 className="font-semibold text-lg mb-4">Color</h3>
                                        <div className="flex gap-4">
                                            {colores.map(c => (
                                                <button 
                                                    key={c.id} 
                                                    onClick={() => updatePedido('color', c.id)}
                                                    className={`w-24 h-28 rounded-2xl flex flex-col items-center justify-center gap-2 border-2 transition-all ${
                                                        pedido.color === c.id ? 'border-black bg-zinc-50 shadow-md scale-105' : 'border-transparent hover:bg-zinc-50'
                                                    }`}
                                                >
                                                    <div className="w-12 h-12 rounded-full shadow-inner border border-zinc-200" style={{ backgroundColor: c.hex }}></div>
                                                    <span className="text-xs font-semibold text-center leading-tight">{c.label}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div>
                                        <h3 className="font-semibold text-lg mb-4 flex justify-between items-end">
                                            Talla
                                        </h3>
                                        <div className="grid grid-cols-4 gap-3 md:gap-4">
                                            {tallas.map(t => (
                                                <button 
                                                    key={t} 
                                                    onClick={() => updatePedido('talla', t)}
                                                    className={`py-4 rounded-2xl font-bold text-lg md:text-xl transition-all ${
                                                        pedido.talla === t 
                                                        ? 'bg-black text-white shadow-lg shadow-black/30 scale-105' 
                                                        : 'bg-zinc-100 text-zinc-500 hover:bg-zinc-200'
                                                    }`}
                                                >
                                                    {t}
                                                </button>
                                            ))}
                                        </div>
                                        
                                        {/* TABLA DE TALLAS */}
                                        {(pedido.producto === 'poleron' || pedido.producto === 'conjunto') && (
                                            <div className="mt-8 w-full slide-in-bottom">
                                                <h4 className="text-sm font-bold text-zinc-400 uppercase tracking-widest mb-4">Guía de Tallas (Polerón)</h4>
                                                <img src="./img/POLERON ROSADO/Tallas poleron (1).png" alt="Guía de Tallas Polerón" className="w-full max-w-md mx-auto object-contain rounded-2xl shadow-sm border border-black/5" />
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {/* PASO 3: DETALLES POLERON */}
                            {currentStep === "detalles_poleron" && (
                                <div className="fade-in">
                                    <h2 className="text-3xl font-bold mb-8">Detalles del Polerón</h2>
                                    
                                    <div className="mb-8">
                                        <h3 className="font-semibold text-lg mb-4">Bolsillos</h3>
                                        <div className="grid grid-cols-2 gap-4">
                                            {['con', 'sin'].map(op => (
                                                <button 
                                                    key={op} 
                                                    onClick={() => updatePedido('bolsillos', op)}
                                                    className={`p-5 rounded-2xl border-2 font-semibold text-lg transition-all ${
                                                        pedido.bolsillos === op ? 'border-black bg-black text-white' : 'border-zinc-200 bg-white'
                                                    }`}
                                                >
                                                    {op === 'con' ? 'Con Bolsillos' : 'Sin Bolsillos'}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div>
                                        <h3 className="font-semibold text-lg mb-4">Bordado</h3>
                                        <div className="grid grid-cols-2 gap-4">
                                            {[
                                                {id: 'delantero', l: 'Delantero'}, {id: 'espalda', l: 'Trasero'}, 
                                                {id: 'ambos', l: 'Ambos Lados'}, {id: 'sin', l: 'Sin Bordado'}
                                            ].map(op => (
                                                <button 
                                                    key={op.id} 
                                                    onClick={() => updatePedido('bordado_poleron', op.id)}
                                                    className={`p-4 rounded-2xl border-2 font-semibold transition-all ${
                                                        pedido.bordado_poleron === op.id ? 'border-black bg-zinc-50' : 'border-zinc-200 bg-white'
                                                    }`}
                                                >
                                                    {op.l}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* PASO 3 ALTERNO: DETALLES PANTALON */}
                            {currentStep === "detalles_pantalon" && (
                                <div className="fade-in">
                                    <h2 className="text-3xl font-bold mb-8">Detalles del Pantalón</h2>
                                    
                                    <div>
                                        <h3 className="font-semibold text-lg mb-4">Bordado</h3>
                                        <div className="grid grid-cols-2 gap-4">
                                            {['con', 'sin'].map(op => (
                                                <button 
                                                    key={op} 
                                                    onClick={() => updatePedido('bordado_pantalon', op)}
                                                    className={`p-5 rounded-2xl border-2 font-semibold text-lg transition-all ${
                                                        pedido.bordado_pantalon === op ? 'border-black bg-zinc-50' : 'border-zinc-200 bg-white'
                                                    }`}
                                                >
                                                    {op === 'con' ? 'Con Bordado' : 'Sin Bordado'}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}



                            {/* FOOTER ESPACIO PARA SCROLL */}
                            <div className="h-32"></div>

                        </div>

                        {/* FOOTER FIJO (Navegación / Continuar) */}
                        <div className="bg-white border-t border-zinc-100 p-6 md:p-8 flex items-center justify-between sticky bottom-0 z-10 shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
                            <div className="hidden md:block">
                                <div className="text-sm font-bold text-zinc-400 uppercase tracking-widest mb-1">Total a pagar</div>
                                <div className="text-2xl font-black">${total.toLocaleString("es-CL")}</div>
                            </div>
                            
                            <button 
                                disabled={!canNext() || isSubmitting}
                                onClick={currentStep === "pago" ? confirmarPedido : nextStep}
                                className={`w-full md:w-auto py-4 px-10 rounded-full font-bold text-lg transition-all ${
                                    canNext() && !isSubmitting
                                    ? 'bg-black text-white hover:scale-105 shadow-xl shadow-black/20' 
                                    : 'bg-zinc-200 text-zinc-400 cursor-not-allowed'
                                }`}
                            >
                                {isSubmitting ? "Procesando..." : (currentStep === "pago" ? "Confirmar Pedido 🔑" : "Continuar →")}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LostKeyApp />);
    </script>
</body>
</html>
